version: '3.8'

services:
  admin-panel:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: admin-panel
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - AUTHENTIK_CLIENT_ID=${AUTHENTIK_CLIENT_ID}
      - AUTHENTIK_CLIENT_SECRET=${AUTHENTIK_CLIENT_SECRET}
      - AUTHENTIK_ISSUER=${AUTHENTIK_ISSUER}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXT_PUBLIC_ADMIN_API_URL=${NEXT_PUBLIC_ADMIN_API_URL}
      - NEXT_PUBLIC_PORTFOLIO_URL=${NEXT_PUBLIC_PORTFOLIO_URL}
    networks:
      - proxy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Prisma migration runner (runs once and exits)
  prisma-migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile.migrate
    container_name: admin-panel-migrate
    environment:
      - DATABASE_URL=${DATABASE_URL}
    command: npx prisma migrate deploy
    depends_on:
      - admin-panel
    networks:
      - proxy
    profiles:
      - migrate

networks:
  proxy:
    external: true
